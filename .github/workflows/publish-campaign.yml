name: Generate and verify campaign PDFs

on:
  push:
    branches: [main]
    paths: [campaign-ready.txt]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: ${{ hashFiles('campaign-ready.txt') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install rendering dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-inter fonts-noto-core
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate and verify PDFs
        run: python scripts/generate_pdfs.py
      - name: Commit generated artifacts
        run: |
          rm campaign-ready.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Generate and verify aligned campaign PDFs'
          git push
