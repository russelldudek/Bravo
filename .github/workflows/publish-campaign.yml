name: Publish reconstructed campaign

on:
  push:
    branches: [main]
    paths:
      - campaign-source.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Expand reconstructed campaign source
        run: |
          python - <<'PY'
          import base64
          import json
          from pathlib import Path

          root = Path('.')
          pointer = json.loads((root / 'campaign-source.json').read_text())
          raw = ''.join((root / path).read_text() for path in pointer['chunks'])
          data = json.loads(raw)
          for rel, encoded in data['files'].items():
              path = root / rel
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_bytes(base64.b64decode(encoded))
          (root / 'campaign-source.json').unlink()
          for rel in pointer['chunks']:
              (root / rel).unlink()
          PY
      - name: Install rendering dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-inter fonts-noto-core
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Generate and verify PDFs
        run: python scripts/generate_pdfs.py
      - name: Verify complete campaign
        run: python scripts/audit_campaign.py
      - name: Commit reconstructed campaign to main
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Reconstruct and verify Bravo CPG RoleForge campaign'
          git push
